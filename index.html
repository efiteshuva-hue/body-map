<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{

}

.num{font-family:'Rubik',system-ui,sans-serif;font-variant-numeric:tabular-nums}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
.app{max-width:520px;margin:0 auto;padding:0 16px}

.hdr{padding:22px 0 8px;display:flex;align-items:center;justify-content:space-between}
.hdr .t{font-family:'Rubik';font-weight:800;font-size:22px;letter-spacing:-.5px}

.controls{display:flex;flex-direction:column;gap:10px;margin:14px 0 6px}

/* ===== MAP ===== */
.mapwrap{position:relative;background:linear-gradient(180deg,#12121C,#0C0C14);
  border:1px solid var(--line);border-radius:24px;padding:16px 8px 6px;overflow:hidden;
  background-image:linear-gradient(rgba(124,92,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(124,92,255,.045) 1px,transparent 1px);
  background-size:22px 22px}
.mapwrap::before{content:"";position:absolute;inset:0;
  background:radial-gradient(58% 46% at 50% 40%, rgba(124,92,255,.14), transparent 72%);pointer-events:none}
.corner{position:absolute;width:16px;height:16px;pointer-events:none;border:2px solid rgba(124,92,255,.5)}
.corner.tl{top:10px;left:10px;border-right:none;border-bottom:none;border-radius:6px 0 0 0}
.corner.tr{top:10px;right:10px;border-left:none;border-bottom:none;border-radius:0 6px 0 0}
.corner.bl{bottom:10px;left:10px;border-right:none;border-top:none;border-radius:0 0 0 6px}
.corner.br{bottom:10px;right:10px;border-left:none;border-top:none;border-radius:0 0 6px 0}
.figs{display:flex;justify-content:center;gap:4px;position:relative;z-index:1}
.fig{flex:1;max-width:50%}
.figlabel{text-align:center;color:var(--accent2);font-size:11px;font-weight:700;margin-bottom:2px;letter-spacing:2px}

@keyframes selpulse{0%,100%{stroke-width:2}50%{stroke-width:3.6}}
.grid-line{stroke:rgba(0,0,0,.30);stroke-width:1.3;fill:none;pointer-events:none;stroke-linecap:round}

.legend{margin:12px 8px 4px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);position:relative;z-index:1}

.hint{color:var(--muted);font-size:13px;text-align:center;padding:8px 4px}

.quick{display:flex;gap:8px;margin-top:12px}
.qcard{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px}

.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-inline-start:6px;vertical-align:middle}

.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}

.metrics{display:flex;gap:10px;margin-bottom:14px}
.metric{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 10px;text-align:center}
.metric .mv{font-family:'Rubik';font-weight:800;font-size:26px;line-height:1}

.daygroup{margin-bottom:16px}

.logseg{margin-bottom:12px}

.mcell{aspect-ratio:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;position:relative;display:flex;align-items:flex-start;justify-content:center;padding-top:6px}

.mdot.ghost{background:var(--panel3);opacity:.6}
.wstrip{display:flex;gap:5px;margin-bottom:14px}
.wchip{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 2px 22px;position:relative;display:flex;flex-direction:column;align-items:center;gap:3px}

.dayhead2{font-family:'Rubik';font-weight:700;font-size:15px;margin:6px 2px 10px;color:var(--muted)}
.btn-add-day{width:100%;background:rgba(124,92,255,.12);border:1px dashed var(--accent);color:var(--accent2);font-weight:700;font-size:15px;padding:14px;border-radius:14px;margin-bottom:14px}
.btn-add-day:active{background:rgba(124,92,255,.2)}

.fab{position:fixed;bottom:20px;left:max(16px,calc(50% - 244px));z-index:40;
  background:linear-gradient(135deg,#7C5CFF 0%,#B24BE0 55%,#E0417A 100%);color:#fff;font-weight:700;font-size:15px;
  padding:13px 20px;border-radius:30px;border:1px solid rgba(255,255,255,.2);
  box-shadow:0 12px 30px rgba(124,92,255,.55),0 2px 8px rgba(0,0,0,.4);
  display:flex;align-items:center;gap:9px}
.fab:active{transform:scale(.95)}
.fab .fabic{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.24);display:grid;place-items:center;font-size:20px;line-height:1;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
.topnav{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:6px;margin:4px 0 16px}
.topnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 4px;border-radius:12px;color:var(--muted);font-size:12px;font-weight:600;transition:.2s}

.topnav button.on{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(124,92,255,.3)}

.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:.25s}
.overlay.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;inset-inline:0;bottom:0;z-index:101;max-width:520px;margin:0 auto;background:var(--panel);
  border-radius:24px 24px 0 0;border:1px solid var(--line);max-height:92vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  padding:8px 16px calc(16px + env(safe-area-inset-bottom))}
.sheet.on{transform:translateY(0)}
.grab{width:40px;height:4px;border-radius:3px;background:var(--line2);margin:8px auto 12px}
.sheet h2{margin:2px 0 14px;font-size:19px;font-weight:800}
.sheettop{position:sticky;top:0;z-index:6;background:var(--panel);margin:0 -16px 10px;padding:6px 16px 10px;border-bottom:1px solid var(--line)}
.sheettop h2{margin:2px 0 12px}
.sheettop #exsearch{margin-bottom:10px}
.sheettop .catrow{margin-bottom:0}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
input[type=date],input[type=time],input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--text);font-family:inherit;font-size:15px}
input:focus{outline:none;border-color:var(--accent)}

.minimap{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:10px;margin-bottom:14px}

.exlist{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}

.videobtn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:rgba(255,60,60,.12);border:1px solid rgba(255,90,90,.45);color:#ff9090;font-weight:700;font-size:13px;padding:9px 14px;border-radius:12px;text-decoration:none}

.addx{width:30px;height:30px;border-radius:9px;background:var(--accent);color:#fff;font-size:20px;display:grid;place-items:center;flex:none}

.draftbox{background:var(--panel2);border:1px solid var(--line2);border-radius:14px;padding:12px;margin:6px 0 12px}
.draftbox .dhh{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600}
.drow{display:flex;align-items:center;justify-content:space-between;padding:8px 0}

.drow .dn{font-size:14px;font-weight:600;max-width:34%}
.stepper{display:flex;align-items:center;gap:2px}

.stepper .sv{min-width:46px;text-align:center;font-size:11px;color:var(--muted)}

.hidden{display:none!important}
@media (prefers-reduced-motion:reduce){.m.sel{animation:none}}

<body>
<div class="app">
  <div class="hdr">
    <div><div class="t">מפת <span>שרירים</span></div>
      <div class="sub" id="subtitle">מה עבד לאחרונה — ומה מחכה בתור</div></div>
    <div style="display:flex;gap:8px">
      <button class="iconbtn" id="backupBtn" title="גיבוי ושחזור">💾</button>
      <button class="iconbtn" id="resetBtn" title="איפוס">⟲</button>
    </div>
  </div>

  <div class="topnav" id="nav">
    <button data-tab="map" class="on"><span class="ni">🫀</span><span>מפה</span></button>
    <button data-tab="log"><span class="ni">📖</span><span>יומן</span></button>
    <button data-tab="insights"><span class="ni">📊</span><span>תובנות</span></button>
    <button data-tab="reminders"><span class="ni">⏰</span><span>תזכורות</span></button>
  </div>

  <div id="tab-map">
    <div class="controls">
      <div class="seg" id="periodSeg">
        <button data-p="week" class="on">שבוע</button>

const mem={};
const Store={
  get(k){try{return localStorage.getItem(k)}catch(e){return mem[k]??null}},
  set(k,v){mem[k]=v;try{localStorage.setItem(k,v)}catch(e){}}
};
const KEY_W='bodymap:workouts',KEY_R='bodymap:reminders',KEY_SEED='bodymap:seeded';
let state={workouts:[],reminders:[],period:'week',mode:'volume',tab:'map',sel:null,

function todayISO(){return new Date().toISOString().slice(0,10)}
function daysAgoISO(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10)}
function parseISO(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function daysBetween(a,b){return Math.round((parseISO(b)-parseISO(a))/864e5)}
function uid(){return 'u'+Math.random().toString(36).slice(2,9)}
function e(id,s,r){const x=EXBYID[id];return{exId:id,custom:false,name:x.he,m:x.m,sets:s,reps:r}}
function seedData(){return[
  {id:'s1',date:daysAgoISO(1),entries:[e('pushup',4,15),e('dips',3,10),e('pike',3,8)]},
  {id:'s2',date:daysAgoISO(3),entries:[e('squat',4,20),e('lunge',3,12),e('bridge',3,15)]},
  {id:'s3',date:daysAgoISO(4),entries:[e('pullup',4,6),e('legraise',3,12),e('plank',3,1)]},
  {id:'s4',date:daysAgoISO(6),entries:[e('pushup',3,20),e('hspu',3,5)]},
  {id:'s5',date:daysAgoISO(8),entries:[e('pistol',3,6),e('squat',3,20)]},
  {id:'s6',date:daysAgoISO(11),entries:[e('chinup',3,8),e('row',3,12)]},
  {id:'s7',date:daysAgoISO(15),entries:[e('pushup',4,18),e('dips',3,12),e('plank',3,1)]},
]}
async function load(){
  const w=await Store.get(KEY_W),r=await Store.get(KEY_R),seeded=await Store.get(KEY_SEED);
  if(w)state.workouts=JSON.parse(w);
  else if(!seeded){state.workouts=seedData();await Store.set(KEY_W,JSON.stringify(state.workouts));await Store.set(KEY_SEED,'1')}
  state.reminders=r?JSON.parse(r):[{id:'r1',days:[1,3,5],time:'18:00',label:'אימון ערב',on:true}];
}
function saveW(){Store.set(KEY_W,JSON.stringify(state.workouts))}
function saveR(){Store.set(KEY_R,JSON.stringify(state.reminders))}

/* ================= COMPUTE ================= */
function periodDays(p){return p==='week'?7:p==='month'?30:p==='year'?365:99999}
function filtered(){const cut=daysAgoISO(periodDays(state.period));return state.workouts.filter(w=>w.date>=cut)}
function volumeByMuscle(ws){const v={};for(const k in MUSCLES)v[k]=0;for(const w of ws)for(const en of w.entries)for(const mk in en.m)v[mk]+=en.sets*en.m[mk];return v}
function lastTrained(mk){let best=null;for(const w of state.workouts)for(const en of w.entries)if((en.m[mk]||0)>0){if(!best||w.date>best)best=w.date}return best}
function heatValues(){
  const v=volumeByMuscle(filtered());const res={};
  if(state.mode==='volume'){const max=Math.max(1,...Object.values(v));for(const k in v)res[k]=v[k]/max}
  else{for(const k in MUSCLES){const lt=lastTrained(k);if(!lt){res[k]=1;continue}res[k]=Math.min(1,daysBetween(lt,todayISO())/12)}}
  return{res,vol:v};
}
const STOPS=[[0x25,0x2A,0x44],[0x3E,0x3A,0x7A],[0x7B,0x3F,0xBF],[0xE0,0x41,0x7A],[0xFF,0x9A,0x3C]];
function heatColor(t){t=Math.max(0,Math.min(1,t));const seg=t*(STOPS.length-1);const i=Math.min(STOPS.length-2,Math.floor(seg));const f=seg-i;const a=STOPS[i],b=STOPS[i+1];const c=a.map((av,j)=>Math.round(av+(b[j]-av)*f));return`rgb(${c[0]},${c[1]},${c[2]})`}

function mainEls(){return document.querySelectorAll('#svgFront .m, #svgBack .m')}

  document.getElementById('svgBack').innerHTML=BACK_SVG;

function applyHeat(el,t){
  el.style.fill=heatColor(t);
  el.style.filter=t>0.12?`drop-shadow(0 0 ${3+t*11}px ${heatColor(Math.min(1,t+0.12))})`:'none';
  if(!el.classList.contains('sel'))el.style.stroke=t>0.4?'rgba(255,255,255,.35)':'rgba(255,255,255,.10)';
}
function paintMap(){
  const {res}=heatValues();
  mainEls().forEach(el=>{
    const mk=el.dataset.muscle,sel=state.sel===mk;
    el.classList.toggle('sel',sel);
    if(sel)el.style.stroke='';
    applyHeat(el,res[mk]||0);
  });
  document.getElementById('legLow').textContent=state.mode==='volume'?'מנוחה':'אומן לאחרונה';
  document.getElementById('legHigh').textContent=state.mode==='volume'?'עומס גבוה':'מוזנח / לא אומן';
}

/* ================= INSIGHTS ================= */
function grpVol(v,g){return Object.keys(MUSCLES).filter(k=>MUSCLES[k].grp===g).reduce((s,k)=>s+v[k],0)}
function upperVol(v){return['chest','shoulders','triceps','back','biceps','forearms'].reduce((s,k)=>s+v[k],0)}
function lowerVol(v){return['quads','hamstrings','glutes','calves'].reduce((s,k)=>s+v[k],0)}
function streak(){let s=0,d=todayISO();const set=new Set(state.workouts.map(w=>w.date));if(!set.has(d))d=daysAgoISO(1);while(set.has(d)){s++;const t=parseISO(d);t.setDate(t.getDate()-1);d=t.toISOString().slice(0,10)}return s}
function countInDays(n){const cut=daysAgoISO(n);return state.workouts.filter(w=>w.date>=cut).length}
function buildRecos(){
  const v=volumeByMuscle(filtered()),recos=[];
  const arr=Object.keys(MUSCLES).map(k=>({k,v:v[k]})).sort((a,b)=>a.v-b.v);
  const neg=arr.filter(o=>o.v===0).map(o=>o.k);
  if(neg.length){const names=neg.slice(0,3).map(k=>MUSCLES[k].he).join(', ');const s=suggestExercises(neg[0])[0];
    recos.push({ic:'🧊',c:'var(--bad)',t:'אזורים שלא עבדו כלל בתקופה',d:`${names}${neg.length>3?' ועוד':''}. התחלה טובה: ${s?s.he:''}.`});}
  else{const low=arr[0];recos.push({ic:'📉',c:'var(--warn)',t:`הכי מעט תשומת לב: ${MUSCLES[low.k].he}`,d:`שווה להוסיף ${suggestExercises(low.k)[0]?.he||'תרגיל'} כדי לאזן.`});}
  const push=grpVol(v,'push'),pull=grpVol(v,'pull');
  if(push>0||pull>0){const r=push/(pull||1);
    if(r>1.6)recos.push({ic:'⚖️',c:'var(--warn)',t:'יותר מדי דחיפה מול משיכה',d:'הוסף מתח/חתירה כדי לשמור על כתף בריאה ויציבה.'});
    else if(r<0.6)recos.push({ic:'⚖️',c:'var(--warn)',t:'יותר מדי משיכה מול דחיפה',d:'הוסף שכיבות סמיכה/מקבילים לאיזון.'});}
  const up=upperVol(v),lo=lowerVol(v);
  if(up>0&&lo/(up||1)<0.4)recos.push({ic:'🦵',c:'var(--warn)',t:'פלג גוף תחתון מוזנח',d:'הרגליים מקבלות הרבה פחות מהפלג העליון. יום רגליים ייתן בסיס חזק יותר.'});
  const legLast=lastTrained('quads');
  if(legLast&&daysBetween(legLast,todayISO())>=6)recos.push({ic:'⏳',c:'var(--warn)',t:`${daysBetween(legLast,todayISO())} ימים בלי רגליים`,d:'הזמן לחזור לסקוואטים.'});
  const thisW=countInDays(7),lastW=countInDays(14)-countInDays(7);
  if(thisW>=3)recos.push({ic:'🔥',c:'var(--ok)',t:`שבוע חזק — ${thisW} אימונים`,d:'עקביות מצוינת. שמור על יום מנוחה אחד לפחות.'});
  else if(thisW>0&&thisW<lastW)recos.push({ic:'📅',c:'var(--warn)',t:'קצב יורד השבוע',d:`השבוע ${thisW} אימונים לעומת ${lastW} בשבוע שעבר. אימון קצר עדיף על אפס.`});
  if(!recos.length)recos.push({ic:'✅',c:'var(--ok)',t:'מאוזן יפה',d:'הפיזור בין הקבוצות נראה טוב. המשך ככה.'});
  return recos;
}
function periodLabel(){return{week:'השבוע האחרון',month:'החודש האחרון',year:'השנה האחרונה',all:'כל הזמן'}[state.period]}
function renderInsights(){
  const v=volumeByMuscle(filtered()),max=Math.max(1,...Object.values(v)),{res}=heatValues();
  const bars=Object.keys(MUSCLES).map(k=>({k,v:v[k]})).sort((a,b)=>b.v-a.v)
    .map(o=>`<div class="bar"><div class="bt"><span>${MUSCLES[o.k].he}</span><span class="val num">${o.v.toFixed(0)}</span></div>
      <div class="track"><div class="fill" style="width:${(o.v/max*100)||2}%;background:${heatColor(res[o.k]||0)}"></div></div></div>`).join('');
  const push=grpVol(v,'push'),pull=grpVol(v,'pull'),pushPct=push+pull>0?push/(push+pull)*100:50;
  const up=upperVol(v),lo=lowerVol(v),upPct=up+lo>0?up/(up+lo)*100:50;
  document.getElementById('insightsContent').innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="mv num">${streak()}</div><div class="ml">רצף ימים</div></div>

      <div class="metric"><div class="mv num">${state.workouts.length}</div><div class="ml">סה״כ אימונים</div></div></div>
    <div class="card"><h3>המלצות לשיפור</h3><div class="recos">
      ${buildRecos().map(r=>`<div class="reco"><div class="ic" style="background:${r.c}22">${r.ic}</div><div><div class="rt">${r.t}</div><div class="rd">${r.d}</div></div></div>`).join('')}</div></div>
    <div class="card"><h3>איזון דחיפה / משיכה</h3>
      <div class="bal"><div class="bh"><span>דחיפה ${push.toFixed(0)}</span><span>משיכה ${pull.toFixed(0)}</span></div>
        <div class="balbar"><div class="balmark" style="inset-inline-start:${pushPct}%"></div></div></div>
      <h3 style="margin-top:16px">איזון פלג עליון / תחתון</h3>
      <div class="bal"><div class="bh"><span>עליון ${up.toFixed(0)}</span><span>תחתון ${lo.toFixed(0)}</span></div>
        <div class="balbar"><div class="balmark" style="inset-inline-start:${upPct}%"></div></div></div></div>
    <div class="card"><h3>נפח לפי שריר · ${periodLabel()}</h3>${bars}</div>`;
}

/* ================= LOG ================= */
const MONTHS_HE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
function shiftDate(iso,days=0,months=0){const d=parseISO(iso);
  if(months){const day=d.getDate();d.setDate(1);d.setMonth(d.getMonth()+months);const max=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();d.setDate(Math.min(day,max))}
  if(days)d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}
function startOfWeek(iso){const d=parseISO(iso);d.setDate(d.getDate()-d.getDay());return d.toISOString().slice(0,10)}
function dayVolume(iso){let s=0;state.workouts.filter(w=>w.date===iso).forEach(w=>w.entries.forEach(en=>{for(const k in en.m)s+=en.sets*en.m[k]}));return s}
function maxDayVol(){const ds=[...new Set(state.workouts.map(w=>w.date))];return ds.length?Math.max(1,...ds.map(dayVolume)):1}
function monthLabel(iso){const d=parseISO(iso);return `${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`}
function weekLabel(iso){const s=parseISO(startOfWeek(iso)),e=new Date(s);e.setDate(s.getDate()+6);
  const sm=MONTHS_HE[s.getMonth()].slice(0,3),em=MONTHS_HE[e.getMonth()].slice(0,3);
  return s.getMonth()===e.getMonth()?`${s.getDate()}–${e.getDate()} ${MONTHS_HE[s.getMonth()]}`:`${s.getDate()} ${sm} – ${e.getDate()} ${em}`}
function dayLabel(iso){const d=parseISO(iso);const rel=iso===todayISO()?' · היום':iso===daysAgoISO(1)?' · אתמול':'';
  return `יום ${DAYS_HE[d.getDay()]} · ${d.getDate()} ${MONTHS_HE[d.getMonth()]}${rel}`}
function wcardHtml(w){
  const ms={};w.entries.forEach(en=>Object.keys(en.m).forEach(k=>{if(en.m[k]>=.5)ms[k]=1}));
  const tags=Object.keys(ms).map(k=>`<span class="tag">${MUSCLES[k].he}</span>`).join('');
  const rows=w.entries.map(en=>`<div class="we"><span>${en.name}</span><span class="sets num">${en.sets}×${en.reps}</span></div>`).join('');
  return `<div class="wcard">${rows}<div class="wmuscles">${tags}</div>
    <div class="wactions"><span class="wedit" data-edit="${w.id}">✎ ערוך</span><span class="wdel" data-del="${w.id}">✕ מחק</span></div></div>`;
}
function dayList(iso){
  const ws=state.workouts.filter(w=>w.date===iso);
  if(!ws.length)return `<div class="empty"><div class="e1">🗓️</div><div class="e2">אין אימונים ביום זה</div><div>הוסף אימון כדי לצבוע את הגוף</div></div>`;
  return ws.map(wcardHtml).join('');
}
function monthGrid(){
  const d=parseISO(state.selDate),y=d.getFullYear(),mo=d.getMonth();
  const offset=new Date(y,mo,1).getDay(),dim=new Date(y,mo+1,0).getDate(),maxv=maxDayVol();
  let cells='';for(let i=0;i<offset;i++)cells+='<div class="mcell empty"></div>';
  for(let day=1;day<=dim;day++){
    const iso=`${y}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const vol=dayVolume(iso),c=heatColor(vol/maxv);
    cells+=`<div class="mcell ${iso===todayISO()?'today':''} ${iso===state.selDate?'sel':''}" data-day="${iso}">
      <span class="mnum">${day}</span>${vol>0?`<span class="mdot" style="background:${c};box-shadow:0 0 7px ${c}"></span>`:''}</div>`;}
  return `<div class="mgrid">${DAYS_HE.map(h=>`<div class="mhead">${h}</div>`).join('')}${cells}</div>`;
}
function weekStrip(){
  const start=startOfWeek(state.selDate),maxv=maxDayVol();let chips='';
  for(let i=0;i<7;i++){const iso=shiftDate(start,i),d=parseISO(iso),vol=dayVolume(iso),c=heatColor(vol/maxv);
    chips+=`<button class="wchip ${iso===state.selDate?'sel':''} ${iso===todayISO()?'today':''}" data-day="${iso}">
      <span class="wd">${DAYS_HE[d.getDay()]}</span><span class="wn num">${d.getDate()}</span>
      ${vol>0?`<span class="mdot" style="background:${c};box-shadow:0 0 7px ${c}"></span>`:'<span class="mdot ghost"></span>'}</button>`;}
  return `<div class="wstrip">${chips}</div>`;
}
function renderLog(){
  const el=document.getElementById('logContent');
  const toggle=`<div class="seg logseg">${[['month','חודש'],['week','שבוע'],['day','יום']].map(([v,t])=>`<button data-view="${v}" class="${state.logView===v?'on':''}">${t}</button>`).join('')}</div>`;
  const nav=l=>`<div class="lognav"><button data-nav="prev">‹</button><span class="lognavlabel">${l}</span><button data-nav="next">›</button></div>`;
  const addb=iso=>`<button class="btn-add-day" data-add="${iso}">＋ הוסף אימון ליום זה</button>`;
  let content='';
  if(state.logView==='month')content=nav(monthLabel(state.selDate))+monthGrid()+`<div class="hint">גע ביום כדי לפתוח אותו ולערוך אימונים</div>`;
  else if(state.logView==='week')content=nav(weekLabel(state.selDate))+weekStrip()+`<div class="dayhead2">${dayLabel(state.selDate)}</div>`+addb(state.selDate)+dayList(state.selDate);
  else content=nav(dayLabel(state.selDate))+addb(state.selDate)+dayList(state.selDate);
  el.innerHTML=toggle+content;
}
function setupLogNav(){
  document.getElementById('logContent').addEventListener('click',ev=>{
    const view=ev.target.closest('[data-view]');if(view){state.logView=view.dataset.view;renderLog();return}
    const nv=ev.target.closest('[data-nav]');if(nv){const dir=nv.dataset.nav==='next'?1:-1;
      if(state.logView==='month')state.selDate=shiftDate(state.selDate,0,dir);
      else if(state.logView==='week')state.selDate=shiftDate(state.selDate,7*dir);
      else state.selDate=shiftDate(state.selDate,dir);renderLog();return}
    const day=ev.target.closest('[data-day]');if(day){state.selDate=day.dataset.day;if(state.logView==='month')state.logView='day';renderLog();return}
    const add=ev.target.closest('[data-add]');if(add){openSheet(null,add.dataset.add);return}
    const edit=ev.target.closest('[data-edit]');if(edit){const w=state.workouts.find(x=>x.id===edit.dataset.edit);if(w)openSheet(w);return}
    const del=ev.target.closest('[data-del]');if(del){state.workouts=state.workouts.filter(w=>w.id!==del.dataset.del);saveW();renderLog();toast('האימון נמחק');return}
  });
}

function openSheet(editing,dateForNew){
  state.draft=[];state.editingId=null;state.draftSearch='';state.draftCat='push';state.customSel=[];state.showCustom=false;state.expandedEx=null;

    const x=ev.target.closest('[data-add]');if(x)togglePreset(x.dataset.add)});
  b.querySelector('#toggleCustom').addEventListener('click',()=>{state.showCustom=!state.showCustom;b.querySelector('#customArea').classList.toggle('hidden',!state.showCustom)});
  b.querySelector('#customArea').addEventListener('click',ev=>{
    const mm=ev.target.closest('[data-cm]');if(mm){const k=mm.dataset.cm;
      if(state.customSel.includes(k))state.customSel=state.customSel.filter(v=>v!==k);else state.customSel.push(k);
      mm.classList.toggle('on');refreshMini();return}
    if(ev.target.closest('#addCustom'))addCustom();});
  b.querySelector('#draftbox').addEventListener('click',ev=>{
    const inc=ev.target.closest('[data-inc]');if(inc)return step(inc.dataset.inc,1);
    const dec=ev.target.closest('[data-dec]');if(dec)return step(dec.dataset.dec,-1);
    const rm=ev.target.closest('[data-rm]');if(rm){state.draft=state.draft.filter(d=>d.uid!==rm.dataset.rm);afterDraftChange()}});
  b.querySelector('#saveW').addEventListener('click',saveDraft);
  b.querySelector('#cancelW').addEventListener('click',closeDraft);
  b.querySelectorAll('#catrow [data-cat]').forEach(c=>c.classList.toggle('on',c.dataset.cat===state.draftCat));
  refreshList();refreshDraft();refreshMini();
}
function primaryMuscles(x){return Object.keys(x.m).filter(k=>x.m[k]>=.5).map(k=>MUSCLES[k].he).join(', ')}
function refreshList(){
  const el=document.getElementById('exlist');if(!el)return;
  const term=state.draftSearch;
  const list=term?EX.filter(x=>x.he.includes(term)):EX.filter(x=>x.cat===state.draftCat);
  if(!list.length){el.innerHTML='<div class="hint">לא נמצא תרגיל. אפשר להוסיף תרגיל מותאם אישית ↓</div>';return}
  el.innerHTML=list.map(x=>{const on=state.draft.find(d=>d.exId===x.id),open=state.expandedEx===x.id;
    return `<div class="exitem ${on?'on':''}">
      <div class="exmain"><div><div class="exn">${x.he}</div><div class="exm">${primaryMuscles(x)}</div></div>
        <div class="exbtns"><button class="infox" data-info="${x.id}">${open?'▲':'ⓘ'}</button>
          <button class="addx" data-add="${x.id}">${on?'✓':'＋'}</button></div></div>
      ${open?exInfoHtml(x):''}</div>`}).join('');
}
function exInfoHtml(x){
  const cues=(x.cue||[]).map(c=>`<div class="cue"><b>•</b> ${c}</div>`).join('');
  const q=encodeURIComponent((x.en||x.he)+' tutorial');
  return `<div class="exinfo"><div class="cues">${cues}</div>
    <a class="videobtn" href="https://www.youtube.com/results?search_query=${q}" target="_blank" rel="noopener">▶ צפה בסרטון הדגמה</a></div>`;
}
function refreshDraft(){
  const el=document.getElementById('draftbox');if(!el)return;
  const save=document.getElementById('saveW');if(save)save.disabled=!state.draft.length;
  if(!state.draft.length){el.innerHTML='<div class="hint" style="padding:14px 6px">בחר תרגילים מהרשימה או הוסף תרגיל מותאם</div>';return}
  el.innerHTML=`<div class="dhh">האימון שלך (${state.draft.length})</div>${state.draft.map(d=>`
    <div class="drow"><div class="dn">${d.name}${d.custom?' ·מותאם':''}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="stepper"><button data-dec="${d.uid}|sets">−</button><div class="sv"><b class="num">${d.sets}</b> סטים</div><button data-inc="${d.uid}|sets">＋</button></div>
        <div class="stepper"><button data-dec="${d.uid}|reps">−</button><div class="sv"><b class="num">${d.reps}</b> חז׳</div><button data-inc="${d.uid}|reps">＋</button></div>
        <button class="rm" data-rm="${d.uid}">הסר</button></div></div>`).join('')}`;
}
function draftMuscleIntensity(){
  const v={};for(const k in MUSCLES)v[k]=0;
  state.draft.forEach(d=>{for(const k in d.m)v[k]+=d.m[k]*d.sets});
  state.customSel.forEach(k=>{v[k]=Math.max(v[k],3)});
  const max=Math.max(1,...Object.values(v));const r={};for(const k in v)r[k]=v[k]/max;return r;
}
function refreshMini(){
  const r=draftMuscleIntensity();
  document.querySelectorAll('#miniFront .m, #miniBack .m').forEach(el=>{
    const t=r[el.dataset.muscle]||0;el.style.fill=heatColor(t);
    el.style.filter=t>0.12?`drop-shadow(0 0 ${2+t*7}px ${heatColor(t)})`:'none';});
}
function saveDraft(){
  if(!state.draft.length)return;
  const wasEditing=!!state.editingId,savedDate=state.draftDate;
  const entries=state.draft.map(d=>({exId:d.exId||null,custom:!!d.custom,name:d.name,m:d.m,sets:d.sets,reps:d.reps}));
  if(wasEditing){const w=state.workouts.find(x=>x.id===state.editingId);if(w){w.date=savedDate;w.entries=entries}}
  else state.workouts.push({id:'w'+Date.now(),date:savedDate,entries});
  saveW();closeDraft();
  state.selDate=savedDate;if(state.tab==='log'&&state.logView==='month')state.logView='day';
  renderAll();toast(wasEditing?'האימון עודכן ✓':'האימון נשמר · הגוף התעדכן 🔥');
}
function closeDraft(){state.draft=[];state.editingId=null;state.customSel=[];state.showCustom=false;hideSheet()}

function exportData(){
  const data={app:'body-map',version:1,exportedAt:new Date().toISOString(),workouts:state.workouts,reminders:state.reminders};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='body-map-backup-'+todayISO()+'.json';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast('קובץ הגיבוי ירד למכשיר 📤');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='application/json,.json';
  inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{
      const d=JSON.parse(r.result);
      const ws=Array.isArray(d.workouts)?d.workouts:null;
      if(!ws)throw new Error('bad');
      if(!confirm('שחזור יחליף את כל האימונים הנוכחיים ב-'+ws.length+' אימונים מהגיבוי. להמשיך?'))return;
      state.workouts=ws;
      if(Array.isArray(d.reminders))state.reminders=d.reminders;
      saveW();saveR();hideSheet();renderAll();toast('הגיבוי שוחזר בהצלחה ✓');
    }catch(e){alert('הקובץ אינו קובץ גיבוי תקין של האפליקציה.')}};
    r.readAsText(f);
  };
  inp.click();
}
function openBackupSheet(){
  const n=state.workouts.length;
  document.getElementById('sheetBody').innerHTML=`<div class="grab"></div><h2>גיבוי ושחזור</h2>
    <p style="color:var(--muted);font-size:13.5px;line-height:1.65;margin:0 0 16px">הנתונים נשמרים אוטומטית על המכשיר הזה. גיבוי מאפשר לשמור עותק לקובץ — כדי לא לאבד מידע, או להעביר את האימונים לטלפון/מחשב אחר.</p>
    <div class="backupstat">${n} אימונים · ${state.reminders.length} תזכורות שמורים כרגע</div>
    <button class="btn-primary" id="doExport">📤 ייצוא גיבוי לקובץ</button>
    <button class="btn-ghost" id="doImport">📥 שחזור מקובץ גיבוי</button>
    <button class="btn-ghost" id="closeBackup">סגור</button>
    <p style="color:var(--muted2);font-size:12px;line-height:1.6;margin:14px 2px 0">טיפ: שמור את קובץ הגיבוי בגוגל דרייב או שלח לעצמך במייל/וואטסאפ — כך יהיה לך עותק גם בענן.</p>`;
  const b=document.getElementById('sheetBody');
  b.querySelector('#doExport').addEventListener('click',exportData);
  b.querySelector('#doImport').addEventListener('click',importData);
  b.querySelector('#closeBackup').addEventListener('click',hideSheet);
  showSheet();
}
function openReminderSheet(){
  let sel={days:[],time:'18:00'};
  document.getElementById('sheetBody').innerHTML=`<div class="grab"></div><h2>תזכורת חדשה</h2>
    <div class="field"><label>שם</label><input type="text" id="rlabel" placeholder="למשל: אימון בוקר"></div>
    <div class="field"><label>ימים</label><div class="daypick" id="rdays">${DAYS_HE.map((d,i)=>`<button data-d="${i}">${d}</button>`).join('')}</div></div>
    <div class="field"><label>שעה</label><input type="time" id="rtime" value="18:00"></div>
    <button class="btn-primary" id="saveRem">שמור תזכורת</button><button class="btn-ghost" id="cancelRem">ביטול</button>`;
  const b=document.getElementById('sheetBody');
  b.querySelectorAll('[data-d]').forEach(x=>x.addEventListener('click',()=>{const i=+x.dataset.d;
    if(sel.days.includes(i)){sel.days=sel.days.filter(v=>v!==i);x.classList.remove('on')}else{sel.days.push(i);x.classList.add('on')}}));
  b.querySelector('#cancelRem').addEventListener('click',hideSheet);
  b.querySelector('#saveRem').addEventListener('click',()=>{
    const label=b.querySelector('#rlabel').value.trim()||'אימון',time=b.querySelector('#rtime').value;
    if(!sel.days.length){toast('בחר לפחות יום אחד');return}
    state.reminders.push({id:'r'+Date.now(),days:sel.days.sort(),time,label,on:true});
    saveR();hideSheet();renderReminders();toast('התזכורת נוספה')});
  showSheet();
}

/* ================= NAV ================= */
function switchTab(t){
  state.tab=t;
  ['map','log','insights','reminders'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('hidden',x!==t));
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  document.getElementById('fab').classList.toggle('hidden',t==='reminders'||t==='log');
  const subs={map:'מה עבד לאחרונה — ומה מחכה בתור',log:'נווט לפי חודש · שבוע · יום',insights:'מגמות והמלצות',reminders:'תזכורות אימון'};
  document.getElementById('subtitle').textContent=subs[t];renderAll();
}
function renderAll(){
  if(state.tab==='map'){paintMap();renderQuick();renderDetail()}
  if(state.tab==='log')renderLog();
  if(state.tab==='insights')renderInsights();
  if(state.tab==='reminders')renderReminders();
}
let toastT;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2200)}

document.getElementById('nav').addEventListener('click',ev=>{const b=ev.target.closest('button');if(b)switchTab(b.dataset.tab)});
document.getElementById('periodSeg').addEventListener('click',ev=>{const b=ev.target.closest('button');if(!b)return;state.period=b.dataset.p;document.querySelectorAll('#periodSeg button').forEach(x=>x.classList.toggle('on',x===b));renderAll()});
document.getElementById('modeSeg').addEventListener('click',ev=>{const b=ev.target.closest('button');if(!b)return;state.mode=b.dataset.m;document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.toggle('on',x===b));renderAll()});
document.getElementById('fab').addEventListener('click',()=>openSheet(null,state.tab==='log'?state.selDate:undefined));
document.getElementById('backupBtn').addEventListener('click',openBackupSheet);
document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('לאפס את כל הנתונים ולהתחיל מחדש?')){state.workouts=[];saveW();Store.set(KEY_SEED,'1');renderAll();toast('הנתונים אופסו')}});

(async function init(){await load();buildFigures();setupLogNav();state.selDate=todayISO();switchTab('map')})();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
</script>


</body></html>
